<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme do Racha 💀</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0D0D0D;
      color: #F5F5F5;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-family: 'Anton', sans-serif;
      font-size: 28px;
      color: #FFE000;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .meme-wrapper {
      position: relative;
      display: inline-block;
      max-width: 640px;
      width: 100%;
      border: 3px solid #FFE000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(255,224,0,0.3);
    }

    .meme-wrapper img {
      width: 100%;
      display: block;
    }

    .caption {
      position: absolute;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Anton', sans-serif;
      font-size: clamp(22px, 5vw, 42px);
      color: #fff;
      text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000;
      padding: 12px 16px;
      letter-spacing: 1.5px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .caption-top {
      top: 0;
    }

    .caption-bottom {
      bottom: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      padding-bottom: 16px;
    }

    .tag {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }
    .tag span { color: #FFE000; font-weight: 700; }

    .btn-download {
      margin-top: 20px;
      background: #FFE000;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-weight: 700;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-download:hover { opacity: 0.85; }
  </style>
</head>

        const link = document.createElement('a');
        link.download = 'meme-racha.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      image.src = img.src;
    }
  </script>
